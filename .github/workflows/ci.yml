name: AegisLLM Gateway CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

#  Wymagane uprawnienia, aby GITHUB_TOKEN mógł wypchnąć obraz do GHCR
permissions: write-all

jobs:
  quality-and-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Set up Helm (SRE Tooling)
        uses: azure/setup-helm@v4
        with:
          version: 'v3.14.0'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint with Ruff (Static Analysis)
        run: ruff check .

      - name: Helm Lint (GitOps Validation)
        run: helm lint aegisllm-chart/

      - name: Run Pytest (Unit & Integration Tests)
        env:
          GEMINI_API_KEY: ${{ secrets.TEST_GEMINI_API_KEY }}
        run: |
          pytest

  build-and-push:
    needs: quality-and-tests
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: bronski05
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./gateway/Dockerfile
          push: true
          tags: |
            ghcr.io/bronski05/aegis-gateway:latest
            ghcr.io/bronski05/aegis-gateway:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max