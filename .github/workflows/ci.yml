name: AegisLLM Gateway CI/CD

on:
  # Workflow uruchamiany na push i PR do głównych gałęzi
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Uprawnienia wymagane do publikacji obrazów w GitHub Container Registry (GHCR)
permissions: write-all

jobs:
  quality-and-tests:
    runs-on: ubuntu-latest

    steps:
      # Pobranie repozytorium
      - name: Checkout code
        uses: actions/checkout@v4

      # Ustawienie środowiska Python (wersja produkcyjna projektu)
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'  # cache zależności pip dla szybszych buildów

      # Instalacja Helm do walidacji chartów Kubernetes (GitOps)
      - name: Set up Helm (SRE Tooling)
        uses: azure/setup-helm@v4
        with:
          version: 'v3.14.0'

      # Instalacja zależności projektu
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # Statyczna analiza kodu (lint)
      - name: Lint with Ruff (Static Analysis)
        run: ruff check .

      # Walidacja chartów Helm (sprawdzenie konfiguracji deploymentu)
      - name: Helm Lint (GitOps Validation)
        run: helm lint aegisllm-chart/

      # Testy jednostkowe i integracyjne
      - name: Run Pytest (Unit & Integration Tests)
        env:
          # Klucz testowy do API modelu (nie produkcyjny)
          GEMINI_API_KEY: ${{ secrets.TEST_GEMINI_API_KEY }}
        run: |
          pytest

  build-and-push:
    # Ten job odpala się tylko po sukcesie testów
    needs: quality-and-tests

    # Budowanie obrazu tylko dla push na główne branche (nie PR)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    runs-on: ubuntu-latest

    steps:
      # Pobranie kodu
      - name: Checkout code
        uses: actions/checkout@v4

      # Ustawienie Buildx (rozszerzone buildy Docker)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Logowanie do GitHub Container Registry (GHCR)
      - name: Login to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: bronski05
          # Token repozytorium używany do publikacji obrazu
          password: ${{ secrets.GITHUB_TOKEN }}

      # Budowanie i publikacja obrazu Docker
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./gateway/Dockerfile

          # Publikacja dwóch tagów: latest + konkretna wersja (commit SHA)
          push: true
          tags: |
            ghcr.io/bronski05/aegis-gateway:latest
            ghcr.io/bronski05/aegis-gateway:${{ github.sha }}

          # Cache buildów dla szybszych kolejnych pipeline’ów
          cache-from: type=gha
          cache-to: type=gha,mode=max