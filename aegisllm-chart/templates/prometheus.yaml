apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
      evaluation_interval: 5s

    rule_files:
      - "/etc/prometheus/alerting_rules.yml"

    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - "localhost:9093"

    scrape_configs:
      - job_name: 'aegis-gateway'
        static_configs:
          - targets: ['aegis-gateway-service:80']

  alerting_rules.yml: |
{{ index .Values.prometheus.serverFiles "alerting_rules.yml" | toYaml | indent 4 }}

  alertmanager.yml: |
{{ toYaml .Values.alertmanager.config | indent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegis-prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aegis-prometheus
  template:
    metadata:
      labels:
        app: aegis-prometheus
    spec:
      containers:
        - name: prometheus
          image: "{{ .Values.prometheus.image }}"
          ports:
            - containerPort: {{ .Values.prometheus.port }}
          resources:
            limits:
              cpu: "200m"
              memory: "256Mi"
            requests:
              cpu: "100m"
              memory: "128Mi"
          volumeMounts:
            - name: config-volume
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
            - name: config-volume
              mountPath: /etc/prometheus/alerting_rules.yml
              subPath: alerting_rules.yml

        - name: alertmanager
          image: "{{ .Values.alertmanager.image }}"
          ports:
            - containerPort: {{ .Values.alertmanager.port }}
          volumeMounts:
            - name: config-volume
              mountPath: /etc/alertmanager/alertmanager.yml
              subPath: alertmanager.yml
      volumes:
        - name: config-volume
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: aegis-prometheus-service
spec:
  selector:
    app: aegis-prometheus
  ports:
    - name: prometheus
      protocol: TCP
      port: 9090
      targetPort: {{ .Values.prometheus.port }}
    - name: alertmanager
      protocol: TCP
      port: 9093
      targetPort: {{ .Values.alertmanager.port }}