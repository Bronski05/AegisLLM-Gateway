apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegis-qdrant
  labels:
    app: aegis-qdrant

spec:
  replicas: 1

  selector:
    matchLabels:
      app: aegis-qdrant

  template:
    metadata:
      labels:
        app: aegis-qdrant

    spec:
      containers:
        - name: qdrant

          # Obraz Qdrant (vector database do embeddings i wyszukiwania semantycznego)
          image: "{{ .Values.qdrant.image }}"

          ports:
            - containerPort: {{ .Values.qdrant.port }}

          resources:
            # Limity zasobów – ochrona klastra przed nadmiernym zużyciem CPU/RAM
            limits:
              cpu: 300m
              memory: 256Mi

            # Minimalne zasoby wymagane do stabilnej pracy usługi
            requests:
              cpu: 100m
              memory: 128Mi

---
apiVersion: v1
kind: Service
metadata:
  name: aegis-qdrant-service

spec:
  selector:
    app: aegis-qdrant

  ports:
    - protocol: TCP

      # Port serwisu Qdrant (API wektorowe)
      port: {{ .Values.qdrant.port }}

      # Port kontenera – bezpośrednie mapowanie ruchu
      targetPort: {{ .Values.qdrant.port }}